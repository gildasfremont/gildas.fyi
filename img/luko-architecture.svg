<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <style>
    .label { font-size: 11px; fill: #959a93; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
    .title { font-size: 12px; fill: #1a1d1a; font-weight: 500; }
    .item { font-size: 11px; fill: #959a93; }
    .item-dark { font-size: 11px; fill: #1a1d1a; }
    .box { fill: #fff; stroke: #e5e8e3; stroke-width: 1; rx: 4; }
    .box-scatter { fill: #fff; stroke: #c8ccc6; stroke-width: 1; rx: 4; stroke-dasharray: 4 3; }
    .connector { stroke: #c8ccc6; stroke-width: 1; fill: none; stroke-dasharray: 3 3; }
    .divider { stroke: #e5e8e3; stroke-width: 1; stroke-dasharray: 4 3; }
  </style>

  <!-- Existing: scattered -->
  <text x="20" y="24" class="label">Existant — information dispersée</text>

  <rect x="20" y="40" width="200" height="100" class="box-scatter"/>
  <text x="30" y="60" class="title">Home</text>
  <text x="30" y="78" class="item">Bannière Allianz Travel</text>
  <text x="30" y="93" class="item">Newsletter</text>
  <text x="30" y="108" class="item">Liste contrats</text>
  <text x="30" y="123" class="item">Blocs Documents / Contact / Sinistres</text>

  <rect x="250" y="40" width="200" height="100" class="box-scatter"/>
  <text x="260" y="60" class="title">Onglet Documents</text>
  <text x="260" y="78" class="item">Conditions particulières</text>
  <text x="260" y="93" class="item">Attestations</text>
  <text x="260" y="108" class="item">Échéancier</text>
  <text x="260" y="123" class="item">Conditions générales</text>

  <rect x="480" y="40" width="220" height="100" class="box-scatter"/>
  <text x="490" y="60" class="title">Sous-page contrat</text>
  <text x="490" y="78" class="item">Accordéon Attestation (caché)</text>
  <text x="490" y="93" class="item">Accordéon Sinistre (caché)</text>
  <text x="490" y="108" class="item">Garanties</text>
  <text x="490" y="123" class="item">Paiement</text>

  <!-- Connection lines showing scatter -->
  <line x1="160" y1="140" x2="300" y2="140" class="connector"/>
  <line x1="400" y1="140" x2="540" y2="140" class="connector"/>

  <!-- Divider -->
  <line x1="20" y1="166" x2="700" y2="166" class="divider"/>

  <!-- Redesign: co-located -->
  <text x="20" y="196" class="label">Redesign — tout sous le contrat</text>

  <rect x="20" y="210" width="120" height="80" class="box"/>
  <text x="30" y="230" class="title">Home</text>
  <text x="30" y="248" class="item-dark">Déclarer un sinistre</text>
  <text x="30" y="263" class="item-dark">Générer attestation</text>
  <text x="30" y="278" class="item-dark">Contrats (cartes)</text>

  <text x="156" y="254" class="item" text-anchor="middle">→</text>

  <rect x="172" y="210" width="510" height="80" class="box"/>
  <text x="182" y="230" class="title">Vue contrat</text>

  <text x="182" y="250" class="item-dark">Sinistre</text>
  <text x="182" y="265" class="item-dark">pour ce bien</text>

  <text x="295" y="250" class="item-dark">Attestations</text>
  <text x="295" y="265" class="item-dark">de ce contrat</text>

  <text x="415" y="250" class="item-dark">Documents</text>
  <text x="415" y="265" class="item-dark">de ce contrat</text>

  <text x="530" y="250" class="item-dark">Garanties</text>

  <text x="620" y="250" class="item-dark">Paiement</text>

  <!-- Vertical separators inside the redesign box -->
  <line x1="282" y1="238" x2="282" y2="280" stroke="#e5e8e3" stroke-width="1"/>
  <line x1="402" y1="238" x2="402" y2="280" stroke="#e5e8e3" stroke-width="1"/>
  <line x1="517" y1="238" x2="517" y2="280" stroke="#e5e8e3" stroke-width="1"/>
  <line x1="607" y1="238" x2="607" y2="280" stroke="#e5e8e3" stroke-width="1"/>

</svg>